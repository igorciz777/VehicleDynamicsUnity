<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity Web Player | VehicleDynamics</title>
  <style>
    body {
      padding: 0;
      margin: 0;
      overflow: hidden;
      background: #231F20;
      width: 100vw;
      height: 100vh;
    }

    #unity-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #unity-canvas {
      width: 100% !important;
      height: 100% !important;
      background: #231F20;
    }
  </style>
</head>

<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
  </div>

  <script src="Build/WEBGL_BUILD.loader.js"></script>
  <script>
    const canvas = document.querySelector("#unity-canvas");
    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.getElementsByTagName('head')[0].appendChild(meta);
    }

    createUnityInstance(canvas, {
      dataUrl: "Build/WEBGL_BUILD.data",
      frameworkUrl: "Build/WEBGL_BUILD.framework.js",
      workerUrl: "Build/WEBGL_BUILD.worker.js",
      codeUrl: "Build/WEBGL_BUILD.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "VehicleDynamics",
      productVersion: "0.1.0",
      matchWebGLToCanvasSize: true,
      devicePixelRatio: window.devicePixelRatio || 1,
    }).then((unityInstance) => {
      window.addEventListener('resize', () => {
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
      });
      window.dispatchEvent(new Event('resize'));

    }).catch((message) => {
      alert(message);
    });
  </script>
</body>

</html>
