<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | VehicleDynamics</title>
    <style>
      body { padding: 0; margin: 0; overflow: hidden; background: #231F20; }
      #unity-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
      #unity-canvas { width: 100%; height: 100%; background: #231F20; }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>
    <script src="Build/WEBGL_BUILD.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var config = {
        dataUrl: "Build/WEBGL_BUILD.data",
        frameworkUrl: "Build/WEBGL_BUILD.framework.js",
        codeUrl: "Build/WEBGL_BUILD.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "VehicleDynamics",
        productVersion: "0.1.0",
        devicePixelRatio: window.devicePixelRatio || 1, 
      };

      createUnityInstance(canvas, config).then((unityInstance) => {
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
